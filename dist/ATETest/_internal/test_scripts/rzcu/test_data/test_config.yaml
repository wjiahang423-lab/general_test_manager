# 各测试类型的电源配置
power_settings:
  default:  { vol_main: 12, cur_main: 5,  vol_other: 12, cur_other: 5  }
  od:       { vol_main: 12, cur_main: 30, vol_other: 12, cur_other: 2  }
  od_v:     { vol_main: 12, cur_main: 10, vol_other: 12, cur_other: 5  }
  ia_r:     { vol_main: 12, cur_main: 5,  vol_other: 12, cur_other: 5  }
  ia_v:     { vol_main: 12, cur_main: 10, vol_other: 12, cur_other: 5  }
  id:       { vol_main: 12, cur_main: 5,  vol_other: 12, cur_other: 5  }
  ip:       { vol_main: 12, cur_main: 5,  vol_other: 12, cur_other: 5  }
  op:       { vol_main: 12, cur_main: 30, vol_other: 12, cur_other: 2  }
  hbri:     { vol_main: 12, cur_main: 30, vol_other: 12, cur_other: 2  }
  hbri_8912: { vol_main: 12, cur_main: 3,  vol_other: 12, cur_other: 2  }

