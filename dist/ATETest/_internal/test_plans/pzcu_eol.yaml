name: RZCU EOL 测试
version: "2.0"
description: >
  RZCU（后区控制器）EOL 下线测试。
  数据驱动文件：test_scripts/rzcu/test_data/test_items.yaml（125 条测试项，9 个 sheet）
  日志输出：test_scripts/rzcu/logs/

global_params: {}

variables: {}
variable_types: {}

setup_sequence:
  name: 初始化
  steps:
    - name: 上电 & XCP 连接
      step_type: script
      script: rzcu/setup.py
      function: setup
      params: {}
      limits: ~
      on_fail: abort
      timeout: 30

sequences:
  - name: 数字输出 (OD)
    steps:
      - name: 电源初始化 (OD)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: od
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_OD 数字输出测试
        step_type: loop
        script: rzcu/test_od.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_OD
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 模拟电压输出 (OD_V)
    steps:
      - name: 电源初始化 (OD_V)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: od_v
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_OD_V 模拟电压输出测试
        step_type: loop
        script: rzcu/test_od_v.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_OD_V
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 模拟输入-电阻型 (IA_R)
    steps:
      - name: 电源初始化 (IA_R)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: ia_r
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_IA_R 模拟输入电阻测试
        step_type: loop
        script: rzcu/test_ia_r.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_IA_R
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 模拟输入-电压型 (IA_V)
    steps:
      - name: 电源初始化 (IA_V)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: ia_v
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_IA_V 模拟输入电压测试
        step_type: loop
        script: rzcu/test_ia_v.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_IA_V
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 数字输入 (ID)
    steps:
      - name: 电源初始化 (ID)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: id
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_ID 数字输入测试
        step_type: loop
        script: rzcu/test_id.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_ID
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 输入 PWM (IP)
    steps:
      - name: 电源初始化 (IP)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: ip
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_IP 输入 PWM 测试
        step_type: loop
        script: rzcu/test_ip.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_IP
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 输出 PWM (OP)
    steps:
      - name: 电源初始化 (OP)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: op
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_OP 输出 PWM 测试
        step_type: loop
        script: rzcu/test_op.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_OP
        loop_item_type: measurement
        on_fail: continue
        timeout: 60

  - name: H 桥驱动 (HBRI)
    steps:
      - name: 电源初始化 (HBRI)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: hbri
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_HBRI H 桥驱动测试
        step_type: loop
        script: rzcu/test_hbri.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_HBRI
        loop_item_type: measurement
        on_fail: continue
        timeout: 60

  - name: H 桥驱动 8912 (HBRI_8912)
    steps:
      - name: 电源初始化 (HBRI_8912)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: hbri_8912
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_HBRI_8912 H 桥驱动 8912 测试
        step_type: loop
        script: rzcu/test_hbri_8912.py
        function: run
        params: {}
        loop_source: rzcu/test_data/test_items.yaml
        loop_key: RZCU_HBRI_8912
        loop_item_type: measurement
        on_fail: continue
        timeout: 60

teardown_sequence:
  name: 收尾
  steps:
    - name: 下电
      step_type: script
      script: rzcu/teardown.py
      function: teardown
      params: {}
      limits: ~
      on_fail: continue
      timeout: 15
