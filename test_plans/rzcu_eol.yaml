name: RZCU EOL 娴嬭瘯
version: "2.0"
description: >
  RZCU锛堝悗鍖烘帶鍒跺櫒锛塃OL 涓嬬嚎娴嬭瘯銆?
  鏁版嵁椹卞姩鏂囦欢锛歵est_scripts/rzcu/test_data/RzcuTestCase_SKU4.xlsx锛堢洿鎺ヨ鍙栵紝鏃犻渶 YAML 杞崲锛?
  鏃ュ織杈撳嚭锛歵est_scripts/rzcu/logs/

global_params: {}

variables: {}
variable_types: {}

setup_sequence:
  name: 鍒濆鍖?
  steps:
    - name: 涓婄數 & XCP 杩炴帴
      step_type: script
      script: rzcu/setup.py
      function: setup
      params: {}
      limits: ~
      on_fail: abort
      timeout: 30

sequences:
  - name: 鏁板瓧杈撳嚭 (OD)
    steps:
      - name: 鐢垫簮鍒濆鍖?(OD)
        step_type: script
        script: rzcu/setup.py
        function: restart_power_for
        params:
          test_type: od
        limits: ~
        on_fail: abort
        timeout: 15
      - name: RZCU_OD 鏁板瓧杈撳嚭娴嬭瘯
        step_type: loop
        script: rzcu/test_od.py
        function: run
        params: {}
        loop_source: rzcu/test_data/RzcuTestCase_SKU4.xlsx
        loop_key: RZCU_OD
        loop_item_type: measurement
        on_fail: continue
        timeout: 30

  - name: 妯℃嫙鐢靛帇杈撳嚭 (OD_V)
